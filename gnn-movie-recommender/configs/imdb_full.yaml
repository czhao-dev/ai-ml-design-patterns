# IMDb track, full-scale -- runnable via scripts/download_imdb_full.py +
# scripts/build_imdb_full_dataset.py (see README "With the full IMDb dataset").
#
# Built from IMDb's Non-Commercial Datasets (https://datasets.imdbws.com/),
# filtered to titleType=="movie" with numVotes>=25: ~240K labeled movies,
# ~80K actors/actresses with >=5 credits (see scripts/build_imdb_full_dataset.py
# for the exact filtering/dedup methodology). Not committed to the repo --
# same policy as data/movielens/ (see .gitignore / README License).
#
# Full-batch training (gnn/training.py's train_imdb/predict_imdb) is not
# practical at this scale (~277K nodes, ~36M edges across relations after both
# directions) on a laptop CPU, so this config uses mini-batch neighbor sampling
# (training.train_imdb_minibatch/predict_imdb_minibatch, PyTorch Geometric's
# NeighborLoader) via the training.neighbor_loader block below. NeighborLoader
# for heterogeneous graphs requires torch-sparse + torch-scatter (not needed by
# the sample-scale configs) -- see README "With the full IMDb dataset".
#
# conv_type is "sage" rather than "gat" here (unlike earlier drafts of this
# config) purely for CPU training speed at this scale; GATConv's attention
# softmax adds real compute per sampled neighborhood without a demonstrated
# accuracy win here -- swap to "gat" if you have GPU headroom to spare.
task: node_regression
seed: 1337

data:
  track: imdb
  export_dir: results_full/gnn_export
  split_strategy: holdout
  train_frac: 0.7
  val_frac: 0.15

model:
  hidden_dim: 64
  num_layers: 2
  dropout: 0.2
  conv_type: sage

training:
  epochs: 10
  lr: 0.005
  weight_decay: 0.0001
  device: null
  neighbor_loader:
    batch_size: 1024
    num_neighbors: [15, 10]

output:
  run_dir: experiments/runs/imdb_full
